<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}

body{
font-family:'Poppins',sans-serif;
background:#0b1120;
color:#e2e8f0;
}

/* LOADER */
.loader{
position:fixed;
width:100%;
height:100%;
background:#0b1120;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
.loader div{
width:40px;height:40px;
border:4px solid #3b82f6;
border-top:4px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}
@keyframes spin{
100%{transform:rotate(360deg)}
}

/* PROGRESS BAR */
.progress{
position:fixed;
top:0;
left:0;
height:4px;
background:#3b82f6;
width:0%;
z-index:1000;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:18px 40px;
position:sticky;
top:0;
backdrop-filter:blur(12px);
background:rgba(255,255,255,0.03);
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#cbd5f5;
text-decoration:none;
padding:5px;
}

nav a.active{
color:#38bdf8;
border-bottom:2px solid #38bdf8;
}

/* HERO */
#home{
text-align:center;
padding:100px 20px;
}

#home h1{
font-size:42px;
}

#home p{
color:#94a3b8;
margin:10px 0;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
text-decoration:none;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 25px rgba(59,130,246,0.4);
}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.04);
border-radius:16px;
overflow:hidden;
transition:.4s;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card-content{
padding:20px;
}

/* CONTACT */
input,textarea{
width:100%;
margin:8px 0;
padding:12px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

/* ANIMATION */
.hidden{opacity:0;transform:translateY(40px)}
.show{opacity:1;transform:translateY(0);transition:.7s}

</style>
</head>

<body>

<div class="loader"><div></div></div>
<div class="progress"></div>

<nav>
<h2>Jaydip</h2>
<ul>
<li><a href="#home" class="nav-link">Home</a></li>
<li><a href="#projects" class="nav-link">Projects</a></li>
<li><a href="#contact" class="nav-link">Contact</a></li>
</ul>
</nav>

<section id="home">
<h1>Hi, I'm Jaydip</h1>
<p>Frontend Developer building modern web interfaces</p>
<a href="#" class="btn">Resume</a>
<a href="#contact" class="btn">Contact</a>
</section>

<section id="projects" class="hidden">
<h2 style="text-align:center">Projects</h2>

<div class="projects">

<div class="card">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>Portfolio Website</h3>
<p>Modern UI design</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=800&q=80">
<div class="card-content">
<h3>Landing Page</h3>
<p>Responsive UI</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>
</div>

</div>
</section>

<section id="contact" class="hidden" style="padding:40px">
<h2>Contact</h2>
<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Send</button>
</form>
</section>

<script>

/* LOADER */
window.onload=()=>document.querySelector(".loader").style.display="none";

/* SCROLL PROGRESS */
window.addEventListener("scroll",()=>{
let scrollTop=document.documentElement.scrollTop;
let height=document.documentElement.scrollHeight-document.documentElement.clientHeight;
document.querySelector(".progress").style.width=(scrollTop/height)*100+"%";
});

/* ACTIVE NAV */
let sections=document.querySelectorAll("section");
let navLinks=document.querySelectorAll(".nav-link");

window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
let top=window.scrollY;
let offset=sec.offsetTop-100;
let height=sec.offsetHeight;
let id=sec.getAttribute("id");

if(top>=offset && top<offset+height){
navLinks.forEach(link=>{
link.classList.remove("active");
document.querySelector(`nav a[href*=${id}]`).classList.add("active");
});
}
});
});

/* SCROLL ANIMATION */
let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
