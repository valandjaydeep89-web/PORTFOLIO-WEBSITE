<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:#e2e8f0;
overflow-x:hidden;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.03);
position:sticky;
top:0;
}

nav h2{
font-family:'Orbitron',sans-serif;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
position:relative;
}

nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0;
height:2px;
background:#3b82f6;
transition:.3s;
}
nav a:hover::after{width:100%}

/* HERO */
#home{
text-align:center;
padding:100px 20px;
}

#home h1{
font-family:'Orbitron',sans-serif;
font-size:48px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#typing{
color:#38bdf8;
margin:10px 0;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
text-decoration:none;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #3b82f6;
}

/* PROJECT */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:.4s;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
transition:.4s;
}

.card:hover img{
transform:scale(1.1);
}

.card-content{
padding:15px;
}

/* FORM */
input,textarea{
width:100%;
margin:8px 0;
padding:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:10px;
border:none;
border-radius:20px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* ANIMATION */
.hidden{opacity:0;transform:translateY(30px)}
.show{opacity:1;transform:translateY(0);transition:.6s}

</style>
</head>

<body>

<nav>
<h2>⚡ Jaydip</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="home">
<h1>Hi, I'm Jaydip 🚀</h1>
<h3 id="typing"></h3>
<a href="#" class="btn">Resume</a>
<a href="#contact" class="btn">Contact</a>
</section>

<section id="projects" class="hidden">
<h2 style="text-align:center">💼 Projects</h2>

<div class="projects">

<div class="card">
<img src="https://source.unsplash.com/600x400/?technology,code">
<div class="card-content">
<h3>Portfolio</h3>
<p>Modern UI Website</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>
</div>

<div class="card">
<img src="https://source.unsplash.com/600x400/?website,design">
<div class="card-content">
<h3>Landing Page</h3>
<p>Responsive UI</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>
</div>

</div>
</section>

<section id="contact" class="hidden" style="padding:40px">
<h2>📩 Contact</h2>

<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send 🚀</button>
</form>

</section>

<script>

let t=["Frontend Developer","UI Designer","Web Developer"];
let i=0,j=0,cur="",del=false;

function type(){
if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
else if(del && j>=0) cur=t[i].substring(0,j--);

document.getElementById("typing").innerHTML=cur;

if(j==t[i].length) del=true;
if(j==0 && del){del=false;i=(i+1)%t.length;}

setTimeout(type,90);
}
type();

let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
});

document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
