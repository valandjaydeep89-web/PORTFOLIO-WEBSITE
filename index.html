<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip | Portfolio</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

/* THEME */
:root{
  --bg:#0b1120;
  --text:#e2e8f0;
  --card:#111827;
  --primary:#6366f1;
  --secondary:#22c55e;
}

.light{
  --bg:#f8fafc;
  --text:#0f172a;
  --card:#ffffff;
}

/* BODY */
body{
  background:var(--bg);
  color:var(--text);
  transition:.4s;
  scroll-behavior:smooth;
}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.03);
}

nav h2{color:var(--primary)}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:var(--text);
  text-decoration:none;
  position:relative;
}

/* underline animation */
nav a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-5px;
  left:0;
  background:var(--primary);
  transition:.3s;
}
nav a:hover::after{width:100%}

/* toggle */
.toggle{
  cursor:pointer;
  font-size:18px;
}

/* HERO */
#home{
  text-align:center;
  padding:100px 20px;
}

#home img{
  width:120px;
  border-radius:50%;
  box-shadow:0 0 25px var(--primary);
}

#typing{
  color:var(--primary);
  margin:10px 0;
}

/* 💧 FLOW BUTTON */
.btn{
  position:relative;
  display:inline-block;
  padding:12px 28px;
  margin:10px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  overflow:hidden;
  transition:.4s;
}

/* flowing shine */
.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
  transition:.5s;
}

.btn:hover::before{left:100%}

.btn:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 10px 25px rgba(99,102,241,0.5);
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  margin:20px;
  transition:.4s;
  position:relative;
  overflow:hidden;
}

/* glass shine */
.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  transform:skewX(-25deg);
}

.card:hover::before{
  animation:shine 1s forwards;
}

@keyframes shine{
  100%{left:150%;}
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* PROJECT GRID */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}

/* FORM */
input,textarea{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

/* SOCIAL */
.social a{
  margin:10px;
  color:var(--primary);
  text-decoration:none;
}

/* ANIMATION */
.hidden{
  opacity:0;
  transform:translateY(30px);
}
.show{
  opacity:1;
  transform:translateY(0);
  transition:.6s;
}

/* MOBILE */
@media(max-width:600px){
  nav{flex-direction:column;gap:10px}
}

</style>
</head>

<body>

<nav>
  <h2>🚀 Jaydip</h2>
  <ul>
    <li><a href="#home">🏠 Home</a></li>
    <li><a href="#projects">💼 Projects</a></li>
    <li><a href="#contact">📩 Contact</a></li>
  </ul>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<section id="home">
  <img src="https://via.placeholder.com/120">
  <h1>Hi, I'm Jaydip 👋</h1>
  <h3 id="typing"></h3>

  <a href="#" class="btn">📄 Resume</a>
  <a href="#contact" class="btn">💬 Contact</a>
</section>

<section id="projects" class="hidden">
  <h2>💼 Projects</h2>

  <div class="projects">
    <div class="card">
      <h3>Portfolio Website</h3>
      <p>Modern UI portfolio</p>
      <a href="#" class="btn">🌐 Live</a>
      <a href="#" class="btn">💻 Code</a>
    </div>

    <div class="card">
      <h3>Landing Page</h3>
      <p>Responsive design</p>
      <a href="#" class="btn">🌐 Live</a>
      <a href="#" class="btn">💻 Code</a>
    </div>
  </div>
</section>

<section id="contact" class="hidden">
  <h2>📩 Contact</h2>

  <form>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send 🚀</button>
  </form>

  <div class="social">
    <a href="#">💻 GitHub</a>
    <a href="#">🔗 LinkedIn</a>
  </div>
</section>

<script>

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* TYPING */
let t=["Frontend Developer","UI Designer","Web Learner"];
let i=0,j=0,cur="",del=false;

function type(){
  if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
  else if(del && j>=0) cur=t[i].substring(0,j--);

  document.getElementById("typing").innerHTML=cur;

  if(j==t[i].length) del=true;
  if(j==0 && del){del=false;i=(i+1)%t.length;}

  setTimeout(type,100);
}
type();

/* SCROLL */
let obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting){
      x.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
