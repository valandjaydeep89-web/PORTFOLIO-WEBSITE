<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip | Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

:root{
--bg:#0a0f1c;
--bg2:#020617;
--text:#e6edf3;
--muted:#94a3b8;
--primary:#4f46e5;
--accent:#0ea5e9;
--violet:#7c3aed;
--card:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
}

.light{
--bg:#f8fafc;
--bg2:#e2e8f0;
--text:#020617;
--card:#ffffff;
--border:#e2e8f0;
}

body{
background:linear-gradient(120deg,var(--bg),var(--bg2));
color:var(--text);
overflow-x:hidden;
}

/* animated bg */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle at 20% 20%,rgba(79,70,229,0.2),transparent),
radial-gradient(circle at 80% 80%,rgba(14,165,233,0.2),transparent);
animation:bgmove 20s linear infinite;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translate(0,0)}
50%{transform:translate(-10%,-10%)}
100%{transform:translate(0,0)}
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
backdrop-filter:blur(18px);
background:rgba(255,255,255,0.03);
border-bottom:1px solid var(--border);
position:sticky;
top:0;
}

nav h2{
background:linear-gradient(90deg,var(--primary),var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
text-decoration:none;
color:var(--text);
font-size:14px;
position:relative;
}

nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:0;
width:0%;
height:2px;
background:linear-gradient(90deg,var(--accent),var(--violet));
transition:.3s;
}

nav a:hover::after{
width:100%;
}

.toggle{
cursor:pointer;
font-size:18px;
}

/* hero */
#home{
text-align:center;
padding:120px 20px;
}

#home h1{
font-size:48px;
background:linear-gradient(90deg,var(--primary),var(--violet));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#typing{
color:var(--accent);
margin:10px 0;
}

/* buttons */
.btn{
position:relative;
display:inline-block;
padding:12px 30px;
margin:10px;
border-radius:40px;
background:linear-gradient(135deg,var(--primary),var(--accent));
color:white;
text-decoration:none;
overflow:hidden;
transition:.4s;
}

.btn::before{
content:"";
position:absolute;
width:120%;
height:120%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
top:0;
left:-120%;
transition:.6s;
}

.btn:hover::before{
left:120%;
}

.btn:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 15px 35px rgba(79,70,229,0.4);
}

/* sections */
section{
padding:90px 20px;
text-align:center;
}

/* cards */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:25px;
backdrop-filter:blur(20px);
transition:.4s;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
opacity:0;
transition:.4s;
}

.card:hover::after{
opacity:1;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:0 25px 50px rgba(0,0,0,0.5);
}

/* form */
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
}

/* reveal */
.hidden{
opacity:0;
transform:translateY(40px);
}

.show{
opacity:1;
transform:translateY(0);
transition:.8s ease;
}

/* mobile */
@media(max-width:600px){
nav{flex-direction:column;gap:10px}
#home h1{font-size:34px}
}

</style>
</head>

<body>

<nav>
<h2>Jaydip</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
<div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<section id="home">
<h1>Hi, I'm Jaydip</h1>
<h3 id="typing"></h3>
<a href="#" class="btn">Resume</a>
<a href="#contact" class="btn">Contact</a>
</section>

<section id="projects" class="hidden">
<h2>Projects</h2>

<div class="projects">
<div class="card">
<h3>Portfolio Website</h3>
<p>Modern UI</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>

<div class="card">
<h3>Landing Page</h3>
<p>Responsive Design</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>
</div>

</section>

<section id="contact" class="hidden">
<h2>Contact</h2>
<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button class="btn">Send</button>
</form>
</section>

<script>

function toggleMode(){
document.body.classList.toggle("light");
}

let t=["Frontend Developer","UI Designer","Web Developer"];
let i=0,j=0,cur="",del=false;

function type(){
if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
else if(del && j>=0) cur=t[i].substring(0,j--);

document.getElementById("typing").innerHTML=cur;

if(j==t[i].length) del=true;
if(j==0 && del){del=false;i=(i+1)%t.length;}

setTimeout(type,90);
}
type();

let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
});

document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
