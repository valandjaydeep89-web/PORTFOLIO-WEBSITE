<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip Portfolio</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

:root{
  --bg:#020617;
  --card:rgba(255,255,255,0.06);
  --text:#e2e8f0;
  --blue:#3b82f6;
  --sky:#38bdf8;
  --purple:#8b5cf6;
}

.light{
  --bg:#f8fafc;
  --text:#020617;
  --card:#ffffff;
}

body{
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:var(--text);
  transition:.4s;
  scroll-behavior:smooth;
}

nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  backdrop-filter:blur(18px);
  background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav h2{
  background:linear-gradient(90deg,var(--blue),var(--purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

nav a{
  text-decoration:none;
  color:var(--text);
  position:relative;
}

nav a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-5px;
  left:0;
  background:linear-gradient(90deg,var(--sky),var(--purple));
  transition:.3s;
}

nav a:hover::after{width:100%}

.toggle{
  cursor:pointer;
  font-size:18px;
}

section{
  padding:100px 20px;
  text-align:center;
}

#home h1{
  font-size:42px;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#typing{
  color:var(--sky);
  margin:10px 0;
}

.btn{
  position:relative;
  display:inline-block;
  padding:12px 28px;
  margin:10px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  overflow:hidden;
  transition:.4s;
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
  transition:.5s;
}

.btn:hover::before{left:100%}

.btn:hover{
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 10px 30px rgba(59,130,246,0.5);
}

.card{
  margin:20px;
  padding:25px;
  border-radius:16px;
  background:var(--card);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.08);
  transition:.4s;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:50%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.25),transparent);
  transform:skewX(-25deg);
}

.card:hover::before{
  animation:glass 1s forwards;
}

@keyframes glass{
  100%{left:150%;}
}

.card:hover{
  transform:translateY(-12px);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}

input,textarea{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:white;
}

button{
  margin-top:10px;
  border:none;
}

.hidden{
  opacity:0;
  transform:translateY(30px);
}

.show{
  opacity:1;
  transform:translateY(0);
  transition:.6s;
}

@media(max-width:600px){
  nav{flex-direction:column;gap:10px}
}

</style>
</head>

<body>

<nav>
  <h2>Jaydip</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<section id="home">
  <h1>Hi, I'm Jaydip</h1>
  <h3 id="typing"></h3>
  <a href="#" class="btn">Resume</a>
  <a href="#contact" class="btn">Contact</a>
</section>

<section id="projects" class="hidden">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">
      <h3>Portfolio</h3>
      <p>Modern UI Website</p>
      <a href="#" class="btn">Live</a>
      <a href="#" class="btn">Code</a>
    </div>
    <div class="card">
      <h3>Landing Page</h3>
      <p>Responsive UI</p>
      <a href="#" class="btn">Live</a>
      <a href="#" class="btn">Code</a>
    </div>
  </div>
</section>

<section id="contact" class="hidden">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button class="btn">Send</button>
  </form>
</section>

<script>

function toggleMode(){
  document.body.classList.toggle("light");
}

let t=["Frontend Developer","UI Designer","Web Learner"];
let i=0,j=0,cur="",del=false;

function type(){
  if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
  else if(del && j>=0) cur=t[i].substring(0,j--);

  document.getElementById("typing").innerHTML=cur;

  if(j==t[i].length) del=true;
  if(j==0 && del){del=false;i=(i+1)%t.length;}

  setTimeout(type,100);
}
type();

let obs=new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting){
      x.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
