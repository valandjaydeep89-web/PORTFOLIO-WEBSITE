<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip | Hacker Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Share Tech Mono',monospace;
background:#000;
color:#00fff7;
overflow-x:hidden;
cursor:none;
}

/* MATRIX CANVAS */
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* CURSOR */
.cursor{
width:12px;
height:12px;
background:#00fff7;
position:fixed;
border-radius:50%;
pointer-events:none;
box-shadow:0 0 10px #00fff7,0 0 30px #8b5cf6;
z-index:999;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

nav h2{
font-family:'Orbitron';
color:#00fff7;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:#00fff7;
text-decoration:none;
}

/* HERO */
#home{
text-align:center;
padding:120px 20px;
}

#home h1{
font-size:48px;
text-shadow:0 0 10px #00fff7,0 0 40px #8b5cf6;
}

/* GLITCH */
.glitch{
position:relative;
color:#fff;
}
.glitch::before,.glitch::after{
content:attr(data-text);
position:absolute;
left:0;
}
.glitch::before{
animation:glitch1 1s infinite;
color:#00fff7;
}
.glitch::after{
animation:glitch2 1s infinite;
color:#8b5cf6;
}

@keyframes glitch1{
0%{left:2px}
50%{left:-2px}
100%{left:2px}
}
@keyframes glitch2{
0%{left:-2px}
50%{left:2px}
100%{left:-2px}
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:10px 25px;
border-radius:20px;
background:#00fff7;
color:black;
text-decoration:none;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 20px #00fff7,0 0 40px #8b5cf6;
transform:scale(1.1);
}

/* 3D CARDS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(0,255,247,0.05);
padding:20px;
border-radius:10px;
transform-style:preserve-3d;
transition:.3s;
}

.card:hover{
transform:rotateY(15deg) rotateX(10deg);
box-shadow:0 20px 40px rgba(0,255,247,0.5);
}

/* TERMINAL STYLE */
.terminal{
background:black;
padding:20px;
border-radius:10px;
margin:20px;
font-size:14px;
}

input,textarea{
width:100%;
margin:5px 0;
padding:10px;
background:black;
color:#00fff7;
border:1px solid #00fff7;
}

button{
margin-top:10px;
padding:10px;
background:#00fff7;
border:none;
cursor:pointer;
}

.hidden{opacity:0;transform:translateY(30px)}
.show{opacity:1;transform:translateY(0);transition:.6s}

</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div class="cursor"></div>

<nav>
<h2>⚡ JAYDIP</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="home">
<h1 class="glitch" data-text="HACKER MODE">HACKER MODE</h1>
<p id="typing"></p>
<a href="#" class="btn">Enter</a>
</section>

<section id="projects" class="hidden">
<h2 style="text-align:center">PROJECTS</h2>
<div class="projects">
<div class="card">AI Portfolio</div>
<div class="card">3D Website</div>
<div class="card">Cyber UI</div>
</div>
</section>

<section id="contact" class="hidden">
<h2>CONTACT</h2>

<div class="terminal">
<p>> Send Message...</p>
<form>
<input placeholder="Name">
<input placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send</button>
</form>
</div>

</section>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00fff7";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* TYPING */
let t=["ACCESS GRANTED","LOADING AI SYSTEM","WELCOME DEVELOPER"];
let i=0,j=0,cur="",del=false;

function type(){
if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
else if(del && j>=0) cur=t[i].substring(0,j--);

document.getElementById("typing").innerHTML=cur;

if(j==t[i].length) del=true;
if(j==0 && del){del=false;i=(i+1)%t.length;}

setTimeout(type,80);
}
type();

/* SCROLL */
let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
