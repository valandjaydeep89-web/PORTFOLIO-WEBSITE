<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydip Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
background:#020617;
color:#e2e8f0;
overflow-x:hidden;
cursor:none;
}

/* CURSOR */
.cursor{
width:15px;
height:15px;
border-radius:50%;
background:#3b82f6;
position:fixed;
pointer-events:none;
z-index:999;
box-shadow:0 0 15px #3b82f6,0 0 30px #8b5cf6;
}

/* BACKGROUND ORBS */
.orb{
position:fixed;
width:400px;
height:400px;
background:radial-gradient(circle,#3b82f6,transparent);
filter:blur(120px);
animation:float 10s infinite alternate;
z-index:-1;
}

.orb2{
right:0;
background:radial-gradient(circle,#8b5cf6,transparent);
animation-delay:3s;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(-100px)}
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.03);
}

nav h2{
font-family:'Orbitron';
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

/* HERO */
#home{
text-align:center;
padding:120px 20px;
}

#home h1{
font-family:'Orbitron';
font-size:48px;
background:linear-gradient(90deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#typing{
color:#38bdf8;
margin:10px 0;
text-shadow:0 0 10px #38bdf8;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px;
padding:12px 28px;
border-radius:30px;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
text-decoration:none;
transition:.4s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #3b82f6,0 0 40px #8b5cf6;
}

/* 3D CARDS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:20px;
transform-style:preserve-3d;
transition:.3s;
}

.card:hover{
transform:rotateY(10deg) rotateX(10deg) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,0.7);
}

/* CONTACT */
input,textarea{
width:100%;
margin:8px 0;
padding:10px;
border-radius:10px;
border:none;
background:#0f172a;
color:white;
}

button{
padding:10px;
border:none;
border-radius:20px;
background:#3b82f6;
color:white;
}

/* ANIMATION */
.hidden{opacity:0;transform:translateY(30px)}
.show{opacity:1;transform:translateY(0);transition:.6s}

</style>
</head>

<body>

<div class="cursor"></div>
<div class="orb"></div>
<div class="orb orb2"></div>

<nav>
<h2>⚡ Jaydip</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section id="home">
<h1>AI Portfolio 🚀</h1>
<h3 id="typing"></h3>
<a href="#" class="btn">Resume</a>
<a href="#contact" class="btn">Contact</a>
</section>

<section id="projects" class="hidden">
<h2 style="text-align:center">💼 Projects</h2>

<div class="projects">
<div class="card">
<h3>Portfolio</h3>
<p>3D futuristic UI</p>
</div>

<div class="card">
<h3>Landing Page</h3>
<p>Cyberpunk design</p>
</div>
</div>

</section>

<section id="contact" class="hidden" style="padding:40px">
<h2>📩 Contact</h2>

<form>
<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea placeholder="Message"></textarea>
<button>Send 🚀</button>
</form>

</section>

<script>

/* CURSOR */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.top=e.clientY+"px";
cursor.style.left=e.clientX+"px";
});

/* TYPING */
let t=["AI Developer","3D UI Designer","Future Creator"];
let i=0,j=0,cur="",del=false;

function type(){
if(!del && j<=t[i].length) cur=t[i].substring(0,j++);
else if(del && j>=0) cur=t[i].substring(0,j--);

document.getElementById("typing").innerHTML=cur;

if(j==t[i].length) del=true;
if(j==0 && del){del=false;i=(i+1)%t.length;}

setTimeout(type,90);
}
type();

/* SCROLL */
let obs=new IntersectionObserver(e=>{
e.forEach(x=>{
if(x.isIntersecting){
x.target.classList.add("show");
}
});
});
document.querySelectorAll(".hidden").forEach(el=>obs.observe(el));

</script>

</body>
</html>
